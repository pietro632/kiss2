<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Free Kiss Coupon</title>
<style>
  /* COLORI ESTIVI: Sfondo sfumato che ricorda un tramonto in spiaggia */
  body {
    background: linear-gradient(135deg, #FFF9D2 0%, #FFE0B2 50%, #FFCC80 100%);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow-x: hidden;
  }

  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 60px;
    background-color: #00BCD4; /* Azzurro mare estivo */
    z-index: 1;
    opacity: 0.8;
  }

  .coupon-container {
    background: rgba(255, 255, 255, 0.85); /* Sfondo semi-trasparente per far risaltare il tramonto */
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(255, 112, 67, 0.2);
    text-align: center;
    max-width: 550px;
    padding: 40px 30px 30px;
    z-index: 10;
    position: relative;
    margin: 20px;
  }

  .lips-icon {
    font-size: 5rem;
    line-height: 1;
    margin-bottom: 5px;
    display: inline-block;
    filter: drop-shadow(0px 4px 6px rgba(233, 30, 99, 0.4)); /* Hot pink shadow */
  }

  /* ANIMAZIONE ZOOM IN / ZOOM OUT */
  @keyframes zoomInOut {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); color: #FF3D00; } /* Diventa più acceso quando fa zoom */
  }

  h1 {
    color: #FF5722; /* Arancione acceso estivo */
    font-size: 2.6rem;
    font-weight: 900;
    margin: 10px 0 5px 0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    animation: zoomInOut 2s infinite ease-in-out; /* Applicazione dell'animazione */
  }

  .subtitle {
    color: #FF9800;
    font-size: 1.15rem;
    margin-top: 0;
    margin-bottom: 35px;
    font-weight: 600;
  }

  .badge-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 30px;
  }

  .gold-badge {
    width: 120px;
    height: 120px;
    border: 4px solid #FFC107; /* Giallo sole */
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #E65100;
    font-weight: 800;
    font-size: 0.9rem;
    line-height: 1.5;
    background: white;
  }

  .terms {
    color: #5D4037;
    font-size: 1.1rem;
    line-height: 1.6;
    margin-bottom: 40px;
  }

  .terms strong {
    color: #D84315;
    font-weight: 700;
  }

  .call-to-action {
    color: #E91E63; /* Rosa acceso */
    font-size: 1.4rem;
    font-weight: 800;
    margin-top: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .footer-text {
    color: #9E9E9E;
    font-size: 0.85rem;
    margin-top: 35px;
  }
</style>
</head>
<body>

  <div class="bottom-bar"></div>

  <div class="coupon-container">
    <div class="lips-icon">💋</div>
    
    <h1>YOU WIN A FREE KISS!</h1>
    <p class="subtitle">Congratulations — this is your official prize certificate</p>

    <div class="badge-wrapper">
      <div class="gold-badge">
        <span>OFFICIAL</span>
        <span>KISS</span>
        <span>VOUCHER</span>
        <span style="font-size: 1.2rem; margin-top: -2px;">☀️</span>
      </div>
    </div>

    <p class="terms">
      This coupon entitles the bearer to <strong>one (1) free kiss</strong>, redeemable at any time, subject to mutual consent.
    </p>

    <div class="call-to-action">
      Step forward to claim your prize!
    </div>

    <p class="footer-text">
      Valid indefinitely · No expiry · 100% genuine
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <script>
    // EFFETTO FUOCHI D'ARTIFICIO CONTINUI E CORIANDOLI
    var duration = 15 * 1000;
    var animationEnd = Date.now() + duration;
    var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

    function randomInRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    var interval = setInterval(function() {
      var timeLeft = animationEnd - Date.now();

      if (timeLeft <= 0) {
        return clearInterval(interval);
      }

      var particleCount = 50 * (timeLeft / duration);
      // Fuochi d'artificio che partono dai due lati dello schermo
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
    }, 250);
  </script>
</body>
</html>
